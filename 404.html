<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page introuvable - MECANIQUE 17, garage automobile">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page introuvable | MECANIQUE 17</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .logo {
            width: 120px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(232, 168, 0, 0.2);
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(6rem, 20vw, 12rem);
            color: #e8a800;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(232, 168, 0, 0.3);
        }

        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .error-subtitle {
            font-family: 'Open Sans', sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            color: #aaaaaa;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-home {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #0a0a0a;
            background-color: #e8a800;
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(232, 168, 0, 0.3);
            cursor: pointer;
        }

        .btn-home:hover {
            background-color: #ffbe00;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(232, 168, 0, 0.4);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        .divider {
            width: 60px;
            height: 3px;
            background-color: #e8a800;
            margin: 0 auto 2rem auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/LOGO.jpg" alt="MECANIQUE 17 - Logo" class="logo">
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h1 class="error-title">Page introuvable</h1>
        <p class="error-subtitle">La page que vous recherchez n'existe pas ou a été déplacée.</p>
        <a href="https://mecanique017.github.io/mecanique017/" class="btn-home">Retour à l'accueil</a>
    </div>
</body>
</html>
